<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>수익화 이야기</title>
</head>
<body>
<title>수익화 온보딩 · 성장 드라마</title>
<style>
  :root{
    --bg:#0e0c12; --surface:#16131d; --surface2:#1d1926; --s3:#232030;
    --ink:#f5f2f9; --muted:#a09aad; --faint:#6f6a7d;
    --hair:rgba(255,255,255,.09); --hair2:rgba(255,255,255,.05);
    --violet:#b39cff; --pink:#ff9ecf; --gold:#ffd77a; --teal:#6ff0bf; --cool:#8fa6cf; --red:#ff8a9c;
    --grad:linear-gradient(100deg,#b39cff,#ff9ecf);
    --acc:var(--violet); --glow:rgba(124,63,228,.22);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);
    font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",-apple-system,system-ui,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.6}
  .wrap{max-width:540px;margin:0 auto;padding:22px 16px 60px}
  .kicker{text-align:center;font-size:11px;font-weight:800;letter-spacing:.18em;color:var(--faint);text-transform:uppercase;margin:0 0 12px}

  /* 비교 토글바 */
  .tools{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
  .tgrp{display:flex;gap:3px;background:var(--surface2);border:1px solid var(--hair);border-radius:11px;padding:3px}
  .tgrp .lb{font-size:10px;color:var(--faint);font-weight:700;align-self:center;padding:0 5px}
  .tbtn{font-size:12px;font-weight:700;color:var(--muted);background:transparent;border:none;border-radius:8px;padding:6px 11px;cursor:pointer;transition:.15s}
  .tbtn.on{background:var(--grad);color:#0e0c12}

  /* 무대 */
  .stage{position:relative;border-radius:26px;overflow:hidden;border:1px solid var(--hair);
    background:radial-gradient(130% 68% at 50% -4%,var(--glow),transparent 60%),linear-gradient(180deg,#141019,#0b0910);
    min-height:600px;padding:22px 24px 22px;display:flex;flex-direction:column;transition:background .8s ease,border-color .8s ease;box-shadow:0 30px 70px -30px rgba(0,0,0,.9)}
  .stage[data-mood="gold"]{border-color:rgba(255,215,122,.3)}
  .stage[data-mood="cold"]{border-color:rgba(143,166,207,.22)}

  .top{display:flex;align-items:center;gap:12px;min-height:66px;margin-bottom:6px}
  .charwrap{width:82px;height:82px;flex:0 0 auto;transition:opacity .4s,transform .5s}
  .charwrap svg{width:100%;height:100%;overflow:visible}
  .charwrap.hide{opacity:0;width:0;margin:0;overflow:hidden}
  .chartx{flex:1}
  .chapter{font-size:12px;font-weight:800;letter-spacing:.12em;color:var(--acc);transition:color .6s}

  .narr{font-size:27px;font-weight:700;line-height:1.42;letter-spacing:-.01em;color:var(--ink);text-wrap:balance;word-break:keep-all;margin:6px 0 4px;min-height:126px}
  .narr.serif{font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif}
  .narr b{color:var(--acc);font-weight:800;transition:color .6s}
  .narr .g{color:var(--gold);font-weight:800}
  .narr.in{animation:narrIn .65s cubic-bezier(.2,.9,.25,1)}
  @keyframes narrIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

  /* 장면 비주얼 */
  .beat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;margin:8px 0}
  .dream{font-size:56px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-.03em;
    background:linear-gradient(100deg,#ffd77a,#ff9ecf);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:floaty 3s ease-in-out infinite}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  .dream-sub{font-size:15px;color:var(--muted);font-weight:600}

  /* 퍼널 */
  .funnel{display:flex;flex-direction:column;align-items:center;gap:6px;width:100%}
  .ft{height:56px;display:flex;align-items:center;justify-content:center;border-radius:11px;position:relative;background:var(--surface2);border:1px solid var(--hair);transition:width .5s}
  .ft .fl{font-size:10px;color:var(--faint);font-weight:700}
  .ft .fv{font-size:19px;font-weight:800;font-variant-numeric:tabular-nums;line-height:1.05}
  .ft.in{background:rgba(179,156,255,.16);border-color:rgba(179,156,255,.4)} .ft.in .fv{color:var(--violet)}
  .ft.cv{background:rgba(255,158,207,.14);border-color:rgba(255,158,207,.4)} .ft.cv .fv{color:var(--pink)}
  .ft.buy{background:rgba(255,215,122,.14);border-color:rgba(255,215,122,.4)} .ft.buy .fv{color:var(--gold)}
  .ft.beat-p{animation:pmark .6s ease}
  @keyframes pmark{0%{transform:scale(1)}35%{transform:scale(1.09);box-shadow:0 0 24px var(--glow)}100%{transform:scale(1)}}
  .farrow{font-size:12px;color:var(--faint);line-height:.5}

  /* 비포/애프터 */
  .ba{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%}
  .ba-row{display:flex;align-items:center;gap:12px;width:100%;justify-content:center}
  .ba-box{flex:1;max-width:150px;text-align:center;border-radius:14px;padding:12px;border:1px solid var(--hair);background:var(--surface2)}
  .ba-box .t{font-size:10px;color:var(--faint);font-weight:700}
  .ba-box .n{font-size:26px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-.02em}
  .ba-box.before{opacity:.6} .ba-box.before .n{color:var(--muted)}
  .ba-box.after{border-color:var(--gold);box-shadow:0 0 24px rgba(255,215,122,.28)} .ba-box.after .n{color:var(--gold)}
  .ba-x{font-size:20px;font-weight:900;color:var(--gold)}
  .ba-eq{font-size:14px;color:var(--muted);font-weight:600}
  .ba-eq b{color:var(--ink)}

  /* 비포→애프터 세로 변신 */
  .ba2{display:flex;flex-direction:column;align-items:center;gap:9px;width:100%}
  .ba2-ctx{font-size:12px;color:var(--muted);font-weight:600;text-align:center}
  .ba2-ctx b{color:var(--ink)}
  .ba2-tag{font-size:10.5px;font-weight:800;letter-spacing:.05em;color:var(--faint)}
  .ba2-tag.goal{color:var(--gold)}
  .ba2-row{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--hair);border-radius:13px;padding:10px 15px;transition:.4s}
  .ba2-row.now{opacity:.72}
  .ba2-row.goalrow{border-color:var(--gold);box-shadow:0 0 24px rgba(255,215,122,.28)}
  .ba2-row .c{display:flex;flex-direction:column;align-items:center;line-height:1.05}
  .ba2-row .c i{font-size:9px;color:var(--faint);font-weight:700;font-style:normal;margin-bottom:1px}
  .ba2-row .c b{font-size:19px;font-weight:900;font-variant-numeric:tabular-nums}
  .ba2-row .c.vin b{color:var(--violet)} .ba2-row .c.vcv b{color:var(--pink)} .ba2-row .c.vrev b{color:var(--ink)}
  .ba2-row.goalrow .c.vrev b{color:var(--gold)}
  .ba2-row .op{color:var(--faint);font-weight:900;font-size:15px}
  .ba2-arrow{display:flex;flex-direction:column;align-items:center;gap:3px}
  .ba2-arrow .dn{font-size:22px;color:var(--gold);line-height:.7;animation:arrBounce 1.3s ease-in-out infinite}
  @keyframes arrBounce{0%,100%{transform:translateY(-2px)}50%{transform:translateY(3px)}}
  .ba2-arrow .x100c{font-size:12px;font-weight:900;color:var(--gold);background:rgba(255,215,122,.16);border:1px solid rgba(255,215,122,.4);border-radius:99px;padding:2px 11px}
  .ba2-arrow .lbl{font-size:11.5px;color:var(--pink);font-weight:700}

  /* 채널 */
  .chan{display:flex;flex-direction:column;gap:7px;width:100%;max-width:300px}
  .chrow{display:flex;align-items:center;gap:9px}
  .chico{width:28px;height:28px;border-radius:8px;background:var(--surface2);border:1px solid var(--hair);display:flex;align-items:center;justify-content:center;font-size:13px;flex:0 0 auto}
  .chbar{flex:1;height:14px;border-radius:99px;background:var(--s3);overflow:hidden}
  .chbar > i{display:block;height:100%;width:0;border-radius:99px;background:var(--grad);transition:width .7s cubic-bezier(.2,.9,.25,1)}
  .chbar.cap > i{background:linear-gradient(100deg,#ff8a9c,#ffb08a)}
  .chn{font-size:11px;font-weight:700;color:var(--muted);width:44px;text-align:right;font-variant-numeric:tabular-nums}
  .chtot{margin-top:4px;font-size:13px;font-weight:700;text-align:center}
  .chtot b{color:var(--violet)} .chtot.fail b{color:var(--red)}

  /* 분석 */
  .anh{font-size:13px;font-weight:800;color:var(--teal);background:rgba(111,240,191,.1);border:1px solid rgba(111,240,191,.3);border-radius:10px;padding:7px 14px}
  .anq{display:flex;flex-direction:column;gap:6px;width:100%;max-width:320px}
  .anq .r{display:flex;align-items:center;gap:9px;background:var(--surface2);border:1px solid var(--hair);border-radius:10px;padding:8px 11px;font-size:12.5px;color:var(--ink);opacity:0;transform:translateX(-8px);transition:.45s}
  .anq .r.show{opacity:1;transform:none}
  .anq .ic{font-size:14px}

  /* 버스트/스트림/CTA */
  .burst{position:relative;text-align:center}
  .burst .big{font-size:52px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-.03em;
    background:linear-gradient(100deg,#ffd77a,#ff9ecf);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .burst .tag{display:inline-block;margin-top:8px;font-size:13px;font-weight:800;color:var(--gold);background:rgba(255,215,122,.14);border:1px solid rgba(255,215,122,.4);border-radius:99px;padding:5px 14px}
  .spark{position:absolute;inset:-30px;pointer-events:none}
  .spark i{position:absolute;left:50%;top:50%;width:4px;height:4px;border-radius:50%;background:var(--gold);opacity:0}
  .spark.go i{animation:fly .8s ease-out forwards}
  @keyframes fly{0%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(.4)}}
  .streams{display:flex;flex-direction:column;gap:8px;width:100%;max-width:250px}
  .stream{font-size:14px;font-weight:700;padding:11px 15px;border-radius:12px;background:rgba(111,240,191,.1);border:1px solid rgba(111,240,191,.3);color:var(--teal);opacity:0;transform:translateX(-10px);transition:.5s}
  .stream.show{opacity:1;transform:none}
  .cta-formula{font-size:22px;font-weight:900;letter-spacing:-.01em;text-align:center}
  .cta-formula .p1{color:var(--violet)} .cta-formula .p2{color:var(--pink)} .cta-formula .p3{color:var(--gold)}
  .cta-btn{margin-top:6px;font-size:17px;font-weight:900;color:#0e0c12;background:var(--grad);border:none;border-radius:14px;padding:14px 26px;cursor:pointer;box-shadow:0 10px 28px rgba(179,156,255,.4);animation:ctaPulse 2s ease-in-out infinite}
  @keyframes ctaPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  .cta-hint{font-size:11px;color:var(--faint);margin-top:2px}

  /* 공식 계기판(하단, 크게) */
  .engine{display:flex;align-items:center;justify-content:center;gap:9px;border-top:1px solid var(--hair2);padding-top:16px;margin-top:8px}
  .cell{background:var(--surface2);border:1px solid var(--hair);border-radius:13px;padding:9px 13px;text-align:center;transition:.4s}
  .cell.hot{border-color:var(--gold);box-shadow:0 0 18px rgba(255,215,122,.32)}
  .cell.hot.beat-p{animation:pmark .6s ease}
  .cell .l{font-size:10px;color:var(--faint);font-weight:700}
  .cell .v{font-size:22px;font-weight:900;font-variant-numeric:tabular-nums;line-height:1.15}
  .cell.e-in .v{color:var(--violet)} .cell.e-cv .v{color:var(--pink)} .cell.e-rev .v{color:var(--gold)}
  .ex{font-size:18px;color:var(--faint);font-weight:900}

  /* 컨트롤 */
  .ctl{display:flex;align-items:center;gap:12px;justify-content:center;margin-top:18px}
  .nav{font-size:14px;font-weight:800;color:var(--ink);background:var(--surface2);border:1px solid var(--hair);border-radius:12px;padding:11px 18px;cursor:pointer;transition:.15s}
  .nav:hover{border-color:var(--acc)} .nav.pri{background:var(--grad);color:#0e0c12;border:none;min-width:118px}
  .nav:disabled{opacity:.32;cursor:default}
  .dots{display:flex;gap:6px;justify-content:center;margin-top:13px;flex-wrap:wrap}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--s3);border:1px solid var(--hair);cursor:pointer;transition:.2s;padding:0}
  .dot.on{background:var(--grad);border-color:transparent;transform:scale(1.35)}
  .auto{display:flex;justify-content:center;gap:6px;align-items:center;font-size:11.5px;color:var(--muted);margin-top:11px;cursor:pointer;user-select:none}
  .auto input{accent-color:var(--violet)}
  .foot{margin-top:22px;text-align:center;font-size:12.5px;color:var(--muted);line-height:1.7}
  .foot b{color:var(--ink)}
</style>

<div class="wrap">
  <p class="kicker">수익화 이야기</p>


  <div class="stage" id="stage" data-mood="hope">
    <div class="top">
      <div class="charwrap" id="charwrap"></div>
      <div class="chartx"><div class="chapter" id="chapter">프롤로그</div></div>
    </div>
    <div class="narr serif in" id="narr">…</div>
    <div class="beat" id="beat"></div>

    <div class="engine">
      <div class="cell e-in" id="eIn"><div class="l">유입</div><div class="v" id="eInV">–</div></div>
      <div class="ex">×</div>
      <div class="cell e-cv" id="eCv"><div class="l">전환율</div><div class="v" id="eCvV">–</div></div>
      <div class="ex">=</div>
      <div class="cell e-rev" id="eRev"><div class="l">매출</div><div class="v" id="eRevV">–</div></div>
    </div>
  </div>

  <div class="ctl">
    <button class="nav" id="prev">◀</button>
    <button class="nav pri" id="next">다음 ▶</button>
  </div>
  <div class="dots" id="dots"></div>
  <label class="auto"><input type="checkbox" id="autop"> 자동 재생</label>

  <p class="foot">넘기면서 편하게 보세요.</p>
</div>

      ? '<circle cx="26" cy="28" r="12" fill="#8a6ee0"/><circle cx="74" cy="28" r="12" fill="#8a6ee0"/><circle cx="26" cy="28" r="5.5" fill="#ff9ecf"/><circle cx="74" cy="28" r="5.5" fill="#ff9ecf"/>'
      : '';
    return '<svg viewBox="0 0 100 100" fill="#3a2a55">'
      + '<defs><radialGradient id="hg" cx="42%" cy="35%"><stop offset="0%" stop-color="#c9b6ff"/><stop offset="100%" stop-color="#9d80f0"/></radialGradient></defs>'
      + ears
      + '<circle cx="50" cy="56" r="32" fill="url(#hg)"/>'
      + '<circle cx="50" cy="60" r="2.6" fill="#3a2a55"/>'
      + '<g>'+face(expr)+'</g>'
      + '</svg>';
  }

  var S=[
    {ch:'프롤로그 · 목표', mood:'hope', ex:'hope', beat:'dream',
     narr:'난 이 플랫폼으로 <b>월 500만 원</b>을 벌고 싶어.<br>내 상품은 <b>5만 원</b> —<br>그럼 <b>100개</b>를 팔면 되네?',
     inflow:0, convP:0, rev:0},
    {ch:'1장 · 현실', mood:'cold', ex:'sad', beat:'funnel',
     narr:'홈에 <b>1,000명</b>이 왔는데…<br>게시물 본 사람 <b>10명</b>,<br>산 사람은 <b>딱 1명.</b> 매출 <b>5만 원.</b>',
     inflow:1000, convP:0.1, rev:5},
    {ch:'2장 · 깨달음', mood:'spark', ex:'surprise', beat:'ba',
     narr:'5 × 100 = 500!<br>구매 <b>1명</b>을 <b>100명</b>으로 —<br>유입을 <b>×100 = 10만 명</b> 모으면 되잖아?',
     inflow:1000, convP:0.1, rev:5},
    {ch:'3장 · 고군분투', mood:'hope', ex:'determined', beat:'chan-try',
     narr:'10만 명을 어떻게 모으지?<br><b>유튜브·릴스·네이버·스레드·틱톡</b> —<br>채널마다 <b>2만 명씩</b> 데려오자!',
     inflow:1000, convP:0.1, rev:5},
    {ch:'4장 · 좌절', mood:'cold', ex:'frustrated', beat:'chan-fail',
     narr:'그런데… 실패.<br>채널마다 <b>1만 명</b>이 한계였어.<br>다 합쳐도 <b>5만 명.</b>',
     inflow:50000, convP:0.1, rev:250},
    {ch:'5장 · 분석', mood:'teal', ex:'curious', beat:'analysis',
     narr:'왜 안 살까? <b>고객을 분석했어.</b><br>언제 반응하고, 어떤 말에 마음 열고,<br>어떤 콘텐츠에 지갑을 여는지.',
     inflow:50000, convP:0.1, rev:250},
    {ch:'6장 · 역전', mood:'gold', ex:'joy', beat:'flip',
     narr:'고객이 원하는 <b>메시지로 게시물</b>을 올렸더니 —<br>유입은 <b>5만 명</b>인데 <b>전환율이 2배!</b><br>결국 <span class="g">500만 원 달성.</span>',
     inflow:50000, convP:0.2, rev:500},
    {ch:'7장 · 확장', mood:'gold', ex:'proud', beat:'streams',
     narr:'쌓인 신뢰로 <b>강의·전자책</b>이 나오고,<br><b>협찬·광고</b>까지 —<br>여러 수익이 <span class="g">초과로</span> 흘러.',
     inflow:50000, convP:0.2, rev:1200},
    {ch:'결론 · 시작', mood:'hope', ex:'hope', beat:'cta',
     narr:'수익화 공식은 <b>유입 × 전환율 × 구매.</b><br>여기에 <b>수치로 체크</b>하고, 부족한 부분을 <b>강화</b>하면<br>원하는 수익에 가까워져.',
     inflow:50000, convP:0.2, rev:1200}
  ];
  var GOAL=500, idx=0, autoTimer=null, charStyle='on', fontMode='serif';
  var stage=g('stage'),charwrap=g('charwrap'),chapter=g('chapter'),narr=g('narr'),beat=g('beat');
  var eInV=g('eInV'),eCvV=g('eCvV'),eRevV=g('eRevV'),eIn=g('eIn'),eCv=g('eCv'),eRev=g('eRev');
  var dots=g('dots'),prev=g('prev'),next=g('next');

  function tween(el,to,dur,suf){
    if(reduce){ el.textContent=fmt(to)+(suf||''); return; }
    var from=parseFloat((el.textContent||'0').replace(/[^0-9.]/g,''))||0,t0=null;
    function st(ts){ if(!t0)t0=ts; var p=Math.min(1,(ts-t0)/dur),e=1-Math.pow(1-p,3);
      el.textContent=fmt(from+(to-from)*e)+(suf||''); if(p<1)requestAnimationFrame(st);}
    requestAnimationFrame(st);
  }
  function pulseEl(el){ if(reduce||!el)return; el.classList.remove('beat-p'); void el.offsetWidth; el.classList.add('beat-p'); }

  function sparks(){ var h=''; for(var i=0;i<14;i++){ var a=i/14*6.28, d=60+Math.random()*30;
    h+='<i style="--dx:'+(Math.cos(a)*d)+'px;--dy:'+(Math.sin(a)*d)+'px;animation-delay:'+(Math.random()*.2)+'s"></i>'; } return h; }

  function renderBeat(s){
    beat.innerHTML='';
    if(s.beat==='dream'){
      beat.innerHTML='<div class="dream">500만</div><div class="dream-sub">5만 원 × 100개</div>';
    }
    else if(s.beat==='funnel'){
      beat.innerHTML='<div class="funnel">'
        +'<div class="ft in" id="f1" style="width:88%"><div><div class="fl">유입</div><div class="fv">1,000</div></div></div><div class="farrow">▼</div>'
        +'<div class="ft cv" id="f2" style="width:52%"><div><div class="fl">게시물 봄(전환)</div><div class="fv">10</div></div></div><div class="farrow">▼</div>'
        +'<div class="ft buy" id="f3" style="width:34%"><div><div class="fl">구매</div><div class="fv">1 · 5만</div></div></div></div>';
      if(!reduce){ ['f1','f2','f3'].forEach(function(id,i){ setTimeout(function(){ pulseEl(g(id)); }, 250+i*550); }); }
    }
    else if(s.beat==='ba'){
      beat.innerHTML='<div class="ba2">'
        +'<div class="ba2-ctx"><b>목표 500만 = 5만 × 100개</b> · 구매 100명 필요</div>'
        +'<div class="ba2-tag">지금 내 공식</div>'
        +'<div class="ba2-row now">'
          +'<span class="c vin"><i>유입</i><b>1,000</b></span><span class="op">×</span>'
          +'<span class="c vcv"><i>전환율</i><b>0.1%</b></span><span class="op">=</span>'
          +'<span class="c vrev"><i>매출</i><b>5만</b></span></div>'
        +'<div class="ba2-arrow"><span class="dn">↓</span><span class="x100c">×100</span><span class="lbl">유입을 100배로 키우면?</span></div>'
        +'<div class="ba2-tag goal">그럼 이렇게 해야겠네!</div>'
        +'<div class="ba2-row goalrow">'
          +'<span class="c vin"><i>유입</i><b id="baIn">1,000</b></span><span class="op">×</span>'
          +'<span class="c vcv"><i>전환율</i><b>0.1%</b></span><span class="op">=</span>'
          +'<span class="c vrev"><i>매출</i><b id="baRev">5만</b></span></div>'
        +'</div>';
      var bi=g('baIn'), br=g('baRev');
      if(bi) tween(bi,100000,1100);
      if(br) tween(br,500,1100,'만');
    }
    else if(s.beat==='chan-try' || s.beat==='chan-fail'){
      var fail=s.beat==='chan-fail';
      var chs=[['▶','유튜브'],['🎬','릴스'],['N','네이버'],['@','스레드'],['♪','틱톡']];
      var h='<div class="chan">';
      for(var i=0;i<chs.length;i++){
        h+='<div class="chrow"><div class="chico">'+chs[i][0]+'</div>'
          +'<div class="chbar'+(fail?' cap':'')+'"><i id="cb'+i+'"></i></div>'
          +'<div class="chn" id="cn'+i+'">'+(fail?'1만':'2만')+'</div></div>';
      }
      h+='<div class="chtot'+(fail?' fail':'')+'">'+(fail?'합계 <b>5만 명</b> · 목표의 절반 😢':'목표 <b>10만 명</b> 도전!')+'</div></div>';
      beat.innerHTML=h;
      for(var j=0;j<5;j++){ (function(j){ setTimeout(function(){ var el=g('cb'+j); if(el) el.style.width=(fail?50:100)+'%'; }, 150+j*160); })(j); }
    }
    else if(s.beat==='analysis'){
      var qs=[['⏰','언제 내 고객이 반응했는가'],['💬','어떤 말에 신뢰가 쌓였는가'],['❤️','어떤 콘텐츠가 마음을 열었는가'],['♻️','재구매는 왜 일어났는가'],['💰','어떤 가격에 납득했는가']];
      var h='<div class="anh">✓ 내 성공의 맥락 찾기</div><div class="anq">';
      for(var i=0;i<qs.length;i++){ h+='<div class="r" id="aq'+i+'"><span class="ic">'+qs[i][0]+'</span>'+qs[i][1]+'</div>'; }
      h+='</div>';
      beat.innerHTML=h;
      for(var j=0;j<qs.length;j++){ (function(j){ setTimeout(function(){ var el=g('aq'+j); if(el) el.classList.add('show'); }, 120+j*180); })(j); }
    }
    else if(s.beat==='flip'){
      beat.innerHTML='<div class="ba-eq" style="margin-bottom:6px">유입 5만(부족) 인데… <b style="color:var(--pink)">전환율 ×2</b> 로 극복!</div>'
        +'<div class="burst"><div class="spark" id="spk">'+sparks()+'</div><div class="big">500만 원</div><div class="tag">🎯 목표 달성 · 전환율의 힘</div></div>';
      if(!reduce){ var sp=g('spk'); setTimeout(function(){ if(sp) sp.classList.add('go'); },80); }
    }
    else if(s.beat==='streams'){
      beat.innerHTML='<div class="streams"><span class="stream" id="v1">＋ 강의 판매</span><span class="stream" id="v2">＋ 전자책</span><span class="stream" id="v3">＋ 브랜드 협찬</span><span class="stream" id="v4">＋ 광고 수익</span></div>';
      ['v1','v2','v3','v4'].forEach(function(id,i){ var el=g(id); if(el) setTimeout(function(){ el.classList.add('show'); }, 140+i*230); });
    }
    else if(s.beat==='cta'){
      beat.innerHTML='<div class="cta-formula"><span class="p1">유입</span> × <span class="p2">전환율</span> × <span class="p3">구매</span></div>'
        +'<button class="cta-btn" id="ctaBtn">지금 시작하시겠습니까? →</button>'
        +'<div class="cta-hint">(실제 앱에선 여기서 편집이 시작돼요)</div>';
      var cb=g('ctaBtn'); if(cb) cb.onclick=function(){ try{ window.parent.postMessage({t:'rv-start'},'*'); }catch(e){} };
    }
  }

  function render(){
    var s=S[idx], m=MOODS[s.mood];
    stage.setAttribute('data-mood', s.mood);
    stage.style.setProperty('--acc', m.acc);
    stage.style.setProperty('--glow', m.glow);
    chapter.textContent=s.ch;
    narr.innerHTML=s.narr;
    narr.classList.remove('in'); void narr.offsetWidth; narr.classList.add('in');
    // 캐릭터
    if(charStyle==='off'){ charwrap.classList.add('hide'); charwrap.innerHTML=''; }
    else { charwrap.classList.remove('hide'); charwrap.innerHTML='<img src="'+(CHARIMG[idx]||'')+'" alt="" style="width:100%;height:100%;object-fit:contain;filter:drop-shadow(0 4px 10px rgba(0,0,0,.5));">'; }
    // 컨트롤
    prev.disabled=idx===0; next.disabled=idx===S.length-1;
    Array.prototype.forEach.call(dots.children,function(d,i){ d.classList.toggle('on',i===idx); });
    // 공식 계기판
    if(s.inflow===0){ eInV.textContent='–'; eCvV.textContent='–'; eRevV.textContent='–'; }
    else{ tween(eInV,s.inflow,750); eCvV.textContent=s.convP+'%'; tween(eRevV,s.rev,800,'만'); }
    var hit=s.rev>=GOAL;
    eRev.classList.toggle('hot',hit);
    eIn.classList.toggle('hot', idx===2||idx===3);
    eCv.classList.toggle('hot', idx===6);
    if(idx===6){ setTimeout(function(){ pulseEl(eCv); pulseEl(eRev); }, 300); }
    // 2장(깨달음)은 위에서 공식을 이미 보여주므로 하단 계기판 숨김(중복 방지)
    var eng=document.querySelector('.engine');
    if(eng) eng.style.display = (s.beat==='ba') ? 'none' : 'flex';
    renderBeat(s);
  }

  for(var i=0;i<S.length;i++){ (function(i){ var d=document.createElement('button'); d.className='dot';
    d.setAttribute('aria-label','장면 '+(i+1)); d.onclick=function(){ idx=i; render(); }; dots.appendChild(d); })(i); }
  prev.onclick=function(){ if(idx>0){idx--;render();} };
  next.onclick=function(){ if(idx<S.length-1){idx++;render();} };
  g('autop').onchange=function(){ if(this.checked){ autoTimer=setInterval(function(){ idx=(idx+1)%S.length; render(); },3800);} else{ clearInterval(autoTimer); autoTimer=null; } };

  // 토글
  Array.prototype.forEach.call(document.querySelectorAll('[data-char]'),function(b){ b.onclick=function(){
    charStyle=b.getAttribute('data-char');
    document.querySelectorAll('[data-char]').forEach(function(x){ x.classList.toggle('on', x===b); });
    render();
  };});
  Array.prototype.forEach.call(document.querySelectorAll('[data-font]'),function(b){ b.onclick=function(){
    fontMode=b.getAttribute('data-font');
    document.querySelectorAll('[data-font]').forEach(function(x){ x.classList.toggle('on', x===b); });
    narr.classList.toggle('serif', fontMode==='serif');
  };});

  render();
})();
</script>

</body>
</html>
