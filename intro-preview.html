<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>인트로 미리보기 · 컨텐츠 허브</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{background:radial-gradient(circle at 50% 50%, #1c1346 0%, #0b0720 55%, #05030d 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; overflow:hidden;}
  .ci-hub{position:relative; width:300px; height:330px;}
  .ci-links{position:absolute; inset:0;}
  .ci-links line{stroke:#8a7fd6; stroke-width:1.3; stroke-dasharray:2 5; opacity:0; animation:ciLink .6s ease .2s forwards;}
  @keyframes ciLink{to{opacity:.55;}}
  .ci-pod{position:absolute; left:150px; top:188px; width:172px; height:46px; border-radius:50%; transform:translate(-50%,-50%);
    border:1px solid rgba(150,120,245,.55); box-shadow:0 0 26px rgba(125,90,235,.5); animation:ciPod 3s ease-in-out infinite;}
  .ci-pod2{top:190px; width:108px; height:26px; border-color:rgba(110,150,255,.4); box-shadow:none; opacity:.5; animation:none;}
  @keyframes ciPod{0%,100%{opacity:.45;} 50%{opacity:.8;}}
  .ci-house{position:absolute; left:150px; top:150px; width:92px; transform:translate(-50%,-52%) scale(.6); opacity:0;
    filter:drop-shadow(0 0 14px rgba(155,90,255,.75)) drop-shadow(0 0 30px rgba(90,140,255,.45)); animation:ciHouse .9s cubic-bezier(.2,.9,.3,1.2) .1s forwards;}
  @keyframes ciHouse{to{opacity:1; transform:translate(-50%,-52%) scale(1);}}
  .ci-node{position:absolute; transform:translate(-50%,-50%) scale(.4); opacity:0; display:flex; flex-direction:column; align-items:center; gap:4px; width:64px;
    animation:ciNode .55s cubic-bezier(.2,.9,.3,1.3) forwards;}
  @keyframes ciNode{to{opacity:1; transform:translate(-50%,-50%) scale(1);}}
  .ci-tile{width:44px; height:44px; border-radius:13px; display:flex; align-items:center; justify-content:center;
    background:linear-gradient(155deg, rgba(255,255,255,.10), rgba(255,255,255,.02));}
  .ci-tile svg{width:23px; height:23px;}
  .ci-lab{font-size:11px; color:#c2bce0; white-space:nowrap;}
  .tl-ig{border:1px solid rgba(214,41,118,.7); box-shadow:0 0 14px rgba(214,41,118,.5); color:#FF7FC4;}
  .tl-yt{border:1px solid rgba(255,70,70,.7); box-shadow:0 0 14px rgba(255,70,70,.45); color:#FF5C5C;}
  .tl-mail{border:1px solid rgba(255,90,180,.7); box-shadow:0 0 14px rgba(255,90,180,.5); color:#FF7FC4;}
  .tl-book{border:1px solid rgba(176,111,232,.7); box-shadow:0 0 14px rgba(176,111,232,.5); color:#C79CF0;}
  .tl-news{border:1px solid rgba(99,201,89,.7); box-shadow:0 0 14px rgba(99,201,89,.4); color:#8BD673;}
  .tl-port{border:1px solid rgba(255,154,61,.7); box-shadow:0 0 14px rgba(255,154,61,.45); color:#FFB266;}
  .ci-tag{text-align:center; font-family:'Nanum Myeongjo',serif; font-size:18px; font-weight:700; color:#EAE6FA; line-height:1.55;
    opacity:0; transform:translateY(8px); animation:ciTag .7s ease 1.1s forwards;}
  @keyframes ciTag{to{opacity:1; transform:none;}}
  .ci-tag b{font-weight:800; background:linear-gradient(95deg,#5B8CFF,#9B3DFF,#FF3DC0); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent;}
  .hint{position:fixed; bottom:18px; left:0; right:0; text-align:center; color:#6a6088; font-size:12px; font-family:system-ui,sans-serif;}
</style>
</head>
<body>
  <div id="ci">
    <div class="ci-hub">
      <svg class="ci-links" viewBox="0 0 300 330" width="300" height="330" aria-hidden="true">
        <line x1="150" y1="150" x2="150" y2="34"/><line x1="150" y1="150" x2="50" y2="92"/><line x1="150" y1="150" x2="50" y2="208"/><line x1="150" y1="150" x2="150" y2="266"/><line x1="150" y1="150" x2="250" y2="208"/><line x1="150" y1="150" x2="250" y2="92"/>
      </svg>
      <span class="ci-pod"></span>
      <span class="ci-pod ci-pod2"></span>
      <img class="ci-house" src="la-mark.png" alt="컨텐츠 허브">
      <div class="ci-node" style="left:150px; top:34px; animation-delay:.30s;"><span class="ci-tile tl-ig"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3.5" y="3.5" width="17" height="17" rx="5"/><circle cx="12" cy="12" r="3.8"/><circle cx="17.6" cy="6.4" r="1.1" fill="currentColor" stroke="none"/></svg></span><span class="ci-lab">인스타그램</span></div>
      <div class="ci-node" style="left:50px; top:92px; animation-delay:.40s;"><span class="ci-tile tl-yt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"><rect x="2.5" y="5.5" width="19" height="13" rx="4"/><path d="M10.2 9.3l4.8 2.7-4.8 2.7z" fill="currentColor" stroke="none"/></svg></span><span class="ci-lab">유튜브</span></div>
      <div class="ci-node" style="left:50px; top:208px; animation-delay:.50s;"><span class="ci-tile tl-mail"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><rect x="3" y="5.5" width="18" height="13" rx="2.5"/><path d="M3.6 7.2l8.4 5.8 8.4-5.8"/></svg></span><span class="ci-lab">뉴스레터</span></div>
      <div class="ci-node" style="left:150px; top:266px; animation-delay:.60s;"><span class="ci-tile tl-book"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><path d="M12 6.2C10 5 7 5 5 5.7v12C7 17 10 17 12 18.2 14 17 17 17 19 17.7v-12C17 5 14 5 12 6.2z"/><path d="M12 6.2v12"/></svg></span><span class="ci-lab">전자책</span></div>
      <div class="ci-node" style="left:250px; top:208px; animation-delay:.70s;"><span class="ci-tile tl-news"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round"><rect x="4" y="5" width="16" height="14" rx="2"/><path d="M7.5 9h9M7.5 12h9M7.5 15h6"/></svg></span><span class="ci-lab">카드뉴스</span></div>
      <div class="ci-node" style="left:250px; top:92px; animation-delay:.80s;"><span class="ci-tile tl-port"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"><rect x="3.5" y="7.5" width="17" height="11" rx="2.5"/><path d="M9 7.5V6.2a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v1.3"/><path d="M3.5 12h17"/></svg></span><span class="ci-lab">포트폴리오</span></div>
    </div>
    <div class="ci-tag">당신의 모든 콘텐츠가<br><b>하나의 자산</b>이 되는 곳.</div>
  </div>
  <div class="hint">미리보기 — 4초마다 반복 재생 · 실제 앱에선 열 때 1회 후 사라짐 (탭하면 스킵)</div>
  <script>
    var host = document.getElementById('ci');
    var html = host.innerHTML;
    setInterval(function(){ host.innerHTML=''; void host.offsetWidth; host.innerHTML=html; }, 4000);
  </script>
</body>
</html>
